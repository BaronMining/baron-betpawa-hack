services:
  - type: web
    name: betpawa-aviator-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_ID
        value: "7611883512"
      - key: CONFIDENCE_THRESHOLD
        value: "0.50"
      - key: AUTO_SEND_INTERVAL
        value: "15"
    plan: free
